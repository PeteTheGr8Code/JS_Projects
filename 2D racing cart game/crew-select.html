<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Crew Role Assignment</title>
  <style>
    :root{
      --bg:#f3e8d2;
      --paper:#f8f1df;
      --ink:#3b2a1f;
      --gold:#8c6b2f;
      --border:#c9b48a;
      --muted:#6b5748;
    }
    body{
      margin:0;
      font-family: Georgia, serif;
      background: var(--bg);
      color: var(--ink);
    }
    header{
      text-align:center;
      padding:18px 12px 12px;
      border-bottom:2px solid var(--border);
    }
    header h1{
      margin:0;
      font-size:28px;
    }
    header .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .container{
      display:flex;
      gap:16px;
      padding:16px;
      align-items:flex-start;
    }
    .panel{
      background: var(--paper);
      border:1px solid var(--border);
      border-radius:8px;
      padding:14px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.05);
    }
    .left{ flex: 0 0 320px; }
    .center{ flex: 1 1 auto; min-width: 420px; }
    .right{ flex: 0 0 320px; }

    .panel h3{
      margin:0 0 10px 0;
      padding-bottom:6px;
      border-bottom:1px solid var(--border);
      font-size:16px;
    }
    .stats .row{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      font-size:16px;
    }
    .stats .val{ font-weight:700; }

    .crew-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height: calc(100vh - 220px);
      overflow:auto;
      padding-right:4px;
    }
    .crew-card{
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px;
      background: rgba(255,255,255,0.18);
    }
    .crew-name{
      font-weight:700;
      margin-bottom:6px;
    }
    .crew-stats{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:10px;
    }
    .pill{
      border:1px solid var(--border);
      border-radius:999px;
      padding:2px 8px;
      background: rgba(255,255,255,0.25);
    }
    .role-buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .role-chip{
      border:1px solid var(--border);
      background: transparent;
      color: var(--ink);
      border-radius:999px;
      padding:6px 10px;
      cursor:pointer;
    }
    .role-chip.active{
      background: var(--gold);
      color: white;
      border-color: var(--gold);
    }

    .assignments{
      display:grid;
      gap:10px;
    }
    .assignment-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
      padding:8px 0;
    }
    .muted{ color: var(--muted); }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
      align-items:center;
    }
    button{
      border:none;
      border-radius:8px;
      padding:10px 14px;
      background: var(--gold);
      color: #fff;
      font-size:14px;
      cursor:pointer;
    }
    button.secondary{
      background: transparent;
      color: var(--ink);
      border:1px solid var(--border);
    }
    button:disabled{
      opacity:0.55;
      cursor:not-allowed;
    }

    .result{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--border);
    }
    .result .big{
      font-size:20px;
      font-weight:800;
      margin:6px 0;
    }

    @media (max-width: 1050px){
      .container{ flex-direction:column; }
      .left,.right,.center{ flex: 1 1 auto; min-width: unset; }
      .crew-grid{ max-height: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Crew Role Assignment</h1>
    <div class="sub">Assign Driver, Attacker, and Defender, then build the final cart.</div>
  </header>

  <div class="container">
    <div class="panel left">
      <h3>Workshop Preview</h3>
      <div class="stats">
        <div style="font-weight:700;margin:4px 0 6px;">Cart</div>
        <div class="row"><span>HP</span><span class="val" id="cartHP">—</span></div>
        <div class="row"><span>AC</span><span class="val" id="cartAC">—</span></div>
        <div class="row"><span>Speed</span><span class="val" id="cartSpeed">—</span></div>

        <div style="height:10px;"></div>

        <div style="font-weight:700;margin:4px 0 6px;">Horse 1</div>
        <div class="row"><span>HP</span><span class="val" id="horse1HP">—</span></div>
        <div class="row"><span>AC</span><span class="val" id="horse1AC">—</span></div>

        <div style="height:10px;"></div>

        <div style="font-weight:700;margin:4px 0 6px;">Horse 2</div>
        <div class="row"><span>HP</span><span class="val" id="horse2HP">—</span></div>
        <div class="row"><span>AC</span><span class="val" id="horse2AC">—</span></div>
      </div>
    </div>

    <div class="panel center">
      <h3>Role Assignment</h3>

      <div class="assignments" id="assignments">
        <div class="assignment-row"><span>Driver</span><strong id="driverName" class="muted">Unassigned</strong></div>
        <div class="assignment-row"><span>Attacker</span><strong id="attackerName" class="muted">Unassigned</strong></div>
        <div class="assignment-row"><span>Defender</span><strong id="defenderName" class="muted">Unassigned</strong></div>
      </div>

      <div class="actions">
        <button id="buildBtn" disabled>Create Final Cart</button>
        <button id="clearBtn" class="secondary">Clear Roles</button>
      </div>

      <div class="result" id="result"></div>
    </div>

    <div class="panel right">
      <h3>Crew Roster</h3>
      <div class="crew-grid" id="crewList"></div>
    </div>
  </div>

  <script type="module" src="./src/crew-select.js"></script>
</body>
</html>
